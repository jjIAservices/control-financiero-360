<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal 360 | Dashboard Financiero</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { background: #020617; color: white; font-family: 'Inter', sans-serif; min-height: 100vh; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        .tab-button.active { border-bottom: 3px solid #3b82f6; color: #3b82f6; opacity: 1; font-weight: bold; }
        .card { background: rgba(30, 41, 59, 0.4); border: 1px solid #1e293b; border-radius: 1rem; padding: 1.25rem; backdrop-filter: blur(10px); }
        .chart-container { position: relative; height: 300px; width: 100%; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        /* Ocultar scrollbar pero permitir scroll */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-end mb-8 gap-6">
            <div>
                <h1 class="text-3xl font-black bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent italic tracking-tighter">
                    PERSONAL 360°
                </h1>
                <p id="status" class="text-slate-500 text-[10px] uppercase tracking-widest mt-1">Sincronizando con Drive...</p>
            </div>
            <div class="flex gap-4 w-full md:w-auto">
                <div class="card flex-1 md:flex-none text-right py-3 px-6 shadow-xl">
                    <p class="text-[10px] text-slate-500 uppercase font-bold mb-1">Gasto Total</p>
                    <h2 id="gastoGlobal" class="text-2xl font-black">0.00 €</h2>
                </div>
            </div>
        </header>

        <nav class="flex border-b border-slate-800 mb-8 overflow-x-auto no-scrollbar gap-2">
            <button onclick="openTab(event, 'global')" class="tab-button active px-6 py-3 opacity-50 whitespace-nowrap text-xs">GLOBAL</button>
            <button onclick="openTab(event, 'hogar')" class="tab-button px-6 py-3 opacity-50 whitespace-nowrap text-xs">HOGAR</button>
            <button onclick="openTab(event, 'coche')" class="tab-button px-6 py-3 opacity-50 whitespace-nowrap text-xs">COCHE</button>
            <button onclick="openTab(event, 'ocio')" class="tab-button px-6 py-3 opacity-50 whitespace-nowrap text-xs">OCIO</button>
            <button onclick="openTab(event, 'deudas')" class="tab-button px-6 py-3 opacity-50 whitespace-nowrap text-xs">DEUDAS</button>
            <button onclick="openTab(event, 'resto')" class="tab-button px-6 py-3 opacity-50 whitespace-nowrap text-xs">RESTO</button>
        </nav>

        <div id="global" class="tab-content active">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="card chart-container flex items-center justify-center">
                    <canvas id="chartCategorias"></canvas>
                </div>
                <div class="flex flex-col gap-4">
                    <div class="card flex justify-between border-l-4 border-l-red-500">
                        <span class="text-slate-400 text-xs uppercase font-bold">Intereses Pagados</span>
                        <span id="totalIntereses" class="text-xl font-bold text-red-400">0.00 €</span>
                    </div>
                    <div class="card flex justify-between border-l-4 border-l-emerald-500">
                        <span class="text-slate-400 text-xs uppercase font-bold">Amortización</span>
                        <span id="totalAmortizado" class="text-xl font-bold text-emerald-400">0.00 €</span>
                    </div>
                    <div class="card flex justify-between border-l-4 border-l-blue-500">
                        <span class="text-slate-400 text-xs uppercase font-bold">Inversión</span>
                        <span id="totalInversion" class="text-xl font-bold text-blue-400">0.00 €</span>
                    </div>
                </div>
            </div>
        </div>

        <div id="deudas" class="tab-content">
            <div id="container-deudas" class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                </div>
            <div class="card overflow-hidden">
                <h3 class="text-slate-500 text-[10px] uppercase font-bold mb-4">Historial de Pagos</h3>
                <table class="w-full text-left text-sm">
                    <tbody id="tbody-deudas" class="divide-y divide-slate-800"></tbody>
                </table>
            </div>
        </div>

        <div id="hogar" class="tab-content"><div class="card overflow-hidden"><table class="w-full text-left text-sm"><tbody id="tbody-hogar" class="divide-y divide-slate-800"></tbody></table></div></div>
        <div id="coche" class="tab-content"><div class="card overflow-hidden"><table class="w-full text-left text-sm"><tbody id="tbody-coche" class="divide-y divide-slate-800"></tbody></table></div></div>
        <div id="ocio" class="tab-content"><div class="card overflow-hidden"><table class="w-full text-left text-sm"><tbody id="tbody-ocio" class="divide-y divide-slate-800"></tbody></table></div></div>
        <div id="resto" class="tab-content"><div class="card overflow-hidden"><table class="w-full text-left text-sm"><tbody id="tbody-resto" class="divide-y divide-slate-800"></tbody></table></div></div>

    </div>

    <script>
        // --- CONFIGURACIÓN DE URLS ---
        const URL_MOVIMIENTOS = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRoPnUWFZlzPKi4UqJH68gT_NbGxQNa6pypWzZ1iyU0hV61mhjcjSH6WzocJT0o0nHcMYyhoGEfmg1_/pub?gid=2145445800&single=true&output=csv'; 
        const URL_DEUDAS = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRoPnUWFZlzPKi4UqJH68gT_NbGxQNa6pypWzZ1iyU0hV61mhjcjSH6WzocJT0o0nHcMYyhoGEfmg1_/pub?gid=1158161811&single=true&output=csv'; 

        let myChart;

        function openTab(evt, tabName) {
            document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
            document.querySelectorAll(".tab-button").forEach(b => b.classList.remove("active"));
            document.getElementById(tabName).classList.add("active");
            evt.currentTarget.classList.add("active");
        }

        function init() {
            if(URL_MOVIMIENTOS.includes('TU_URL')) return;

            // Cargar Movimientos (Gastos diarios)
            Papa.parse(URL_MOVIMIENTOS, {
                download: true, header: true, skipEmptyLines: true,
                complete: (results) => renderMovimientos(results.data)
            });

            // Cargar Configuración de Deudas (Saldos y años)
            Papa.parse(URL_DEUDAS, {
                download: true, header: true, skipEmptyLines: true,
                complete: (results) => renderDeudasCards(results.data)
            });
        }

        function renderMovimientos(data) {
            let totals = { total: 0, intereses: 0, amortizado: 0, inversion: 0 };
            let catStats = { Hogar: 0, Coche: 0, Ocio: 0, Deudas: 0, Resto: 0 };
            
            const tablas = ['hogar', 'coche', 'ocio', 'deudas', 'resto'];
            tablas.forEach(id => document.getElementById(`tbody-${id}`).innerHTML = '');

            data.forEach(row => {
                if (!row.Fecha || row.Fecha.trim() === "") return; // Cortar bucle si no hay fecha

                const monto = parseFloat(row.Importe?.replace('.','').replace(',','.')) || 0;
                const int = parseFloat(row['Int. Recibo']?.replace('.','').replace(',','.')) || 0;
                const amo = parseFloat(row['Amort. Recibo']?.replace('.','').replace(',','.')) || 0;

                totals.total += monto;
                totals.intereses += int;
                totals.amortizado += amo;
                if(row.Tipo?.toLowerCase().includes('inversión')) totals.inversion += monto;

                let cat = row.Categoría?.trim() || 'Resto';
                if(catStats[cat] !== undefined) catStats[cat] += monto;
                else catStats['Resto'] += monto;

                const table = document.getElementById(`tbody-${cat.toLowerCase()}`);
                if(table) {
                    table.innerHTML += `
                        <tr class="hover:bg-slate-800/30">
                            <td class="p-4 text-slate-500 text-[10px] w-24">${row.Fecha}</td>
                            <td class="p-4 font-medium">${row.Concepto || '-'}</td>
                            <td class="p-4 text-right font-bold">${monto.toLocaleString('es-ES', {minimumFractionDigits: 2})} €</td>
                        </tr>`;
                }
            });

            const f = (n) => n.toLocaleString('es-ES', {minimumFractionDigits: 2}) + " €";
            document.getElementById('gastoGlobal').innerText = f(totals.total);
            document.getElementById('totalIntereses').innerText = f(totals.intereses);
            document.getElementById('totalAmortizado').innerText = f(totals.amortizado);
            document.getElementById('totalInversion').innerText = f(totals.inversion);

            updateChart(catStats);
        }

        function renderDeudasCards(data) {
            const container = document.getElementById('container-deudas');
            container.innerHTML = '';

            data.forEach(row => {
                const nombre = row['Nombre Deuda'] || row['Nombre'];
                if(!nombre || nombre.trim() === "") return;

                const inicial = parseFloat(row['Importe Inicial']?.replace('.','').replace(',','.')) || 0;
                const saldo = parseFloat(row['Saldo Pendiente']?.replace('.','').replace(',','.')) || 0;
                const plazo = row['Plazo (Años)'] || '-';
                const progreso = inicial > 0 ? ((inicial - saldo) / inicial * 100) : 0;

                container.innerHTML += `
                    <div class="card border-l-4 border-l-blue-500 shadow-lg">
                        <div class="flex justify-between items-start mb-4">
                            <h3 class="font-bold text-lg text-white">${nombre}</h3>
                            <span class="bg-slate-800 text-[10px] px-2 py-1 rounded border border-slate-700">${plazo} AÑOS</span>
                        </div>
                        <div class="flex justify-between text-[10px] uppercase font-bold text-slate-500 mb-1">
                            <span>Progreso de amortización</span>
                            <span>${progreso.toFixed(1)}%</span>
                        </div>
                        <div class="w-full bg-slate-800 rounded-full h-1.5 mb-4">
                            <div class="bg-blue-500 h-1.5 rounded-full" style="width: ${progreso}%"></div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div><p class="text-[9px] text-slate-500 uppercase">Inicial</p><p class="font-bold text-sm">${inicial.toLocaleString()} €</p></div>
                            <div class="text-right"><p class="text-[9px] text-slate-500 uppercase">Pendiente</p><p class="font-bold text-sm text-emerald-400">${saldo.toLocaleString()} €</p></div>
                        </div>
                    </div>`;
            });
            document.getElementById('status').innerText = 'SINCRONIZADO';
        }

        function updateChart(stats) {
            const ctx = document.getElementById('chartCategorias').getContext('2d');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(stats),
                    datasets: [{
                        data: Object.values(stats),
                        backgroundColor: ['#3b82f6', '#f59e0b', '#ec4899', '#ef4444', '#64748b'],
                        borderWidth: 0
                    }]
                },
                options: {
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8', font: { size: 11 }, padding: 15 } } },
                    cutout: '75%'
                }
            });
        }

        window.onload = init;
    </script>
</body>
</html>
